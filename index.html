<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>智能番茄钟</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <div class="sidebar">
      <h3 id="app-title-sidebar" style="color: #111827; margin-top: 0;"></h3>
      <div class="nav-card active" id="nav-timer" onclick="switchView('timer')"></div>
      <div class="nav-card" id="nav-history" onclick="switchView('history')"></div>
      <button class="settings-btn" id="nav-settings" onclick="switchView('settings')"></button>
    </div>

    <div class="main-content">
      <div id="view-timer" class="view-section active">
        <input type="text" id="task-input">
        
        <div class="timer-container">
          <svg width="240" height="240">
            <circle stroke="#e5e7eb" stroke-width="12" fill="transparent" r="100" cx="120" cy="120"/>
            <circle class="progress-ring__circle" stroke="#10b981" stroke-width="12" fill="transparent" r="100" cx="120" cy="120" id="progress-circle"/>
          </svg>
          <div id="time-display">00:00</div>
        </div>

        <div class="time-options" id="time-options">
          <button class="time-btn" id="btn-add-time" onclick="selectCustomTime(this)">+</button>
        </div>

        <button id="btn-start" class="btn btn-start" onclick="startTimer()"></button>
        <button id="btn-finish" class="btn btn-finish" onclick="finishTask()"></button>
        <button id="btn-enter-mini" class="btn btn-enter-mini" onclick="enterMiniMode()"></button>
      </div>

      <div id="view-history" class="view-section">
        <div style="display: flex; justify-content: space-between; align-items: center; width: 90%; max-width: 1200px; margin-bottom: 20px;">
          <h2 id="history-title" style="color: #1f2937; margin: 0;"></h2>
          <button id="btn-export" class="btn" style="background-color: #10b981; color: white; padding: 8px 15px; font-size: 14px; box-shadow: 0 2px 5px rgba(16, 185, 129, 0.3);" onclick="exportToCSV()"></button>
        </div>
        
        <div class="history-list" id="history-list-container">
          <p id="empty-history-msg" style="color: #9ca3af; text-align: center; margin-top: 50px;"></p>
        </div>

        <div class="pagination-controls" id="history-pagination" style="display: none;">
          <button class="page-btn" id="btn-prev-page" onclick="changeHistoryPage(-1)"></button>
          <span class="page-info" id="page-info-text"></span>
          <button class="page-btn" id="btn-next-page" onclick="changeHistoryPage(1)"></button>
        </div>
      </div>

      <div id="view-settings" class="view-section">
        <h2 id="settings-title" style="color: #1f2937; margin-top: 0; margin-bottom: 20px; width: 90%; max-width: 600px;"></h2>
        <div style="width: 90%; max-width: 600px; display: flex; flex-direction: column; gap: 20px;">
          <div class="history-item" style="flex-direction: column; align-items: flex-start; gap: 15px;">
            <h3 id="settings-sys-title" style="margin: 0; color: #1f2937;"></h3>
            <div style="display: flex; align-items: center; gap: 10px;">
              <input type="checkbox" id="auto-start-checkbox" onchange="toggleAutoStart(this.checked)" style="width: 18px; height: 18px; cursor: pointer;">
              <label id="settings-autostart-label" for="auto-start-checkbox" style="color: #4b5563; font-weight: bold; cursor: pointer;"></label>
            </div>
          </div>
          <div class="history-item" style="flex-direction: column; align-items: flex-start; gap: 10px;">
            <h3 id="settings-contact-title" style="margin: 0; color: #1f2937;"></h3>
            <p id="settings-contact-desc" style="margin: 0; color: #6b7280; font-size: 14px;"></p>
            <div style="background: #f3f4f6; padding: 10px 15px; border-radius: 8px; width: 100%; box-sizing: border-box; color: #1f2937; font-weight: bold; font-family: monospace;">
              🐧 QQ: 3238281044
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="custom-time-modal">
    <div class="modal-content">
      <h3 id="modal-title" style="margin-top:0; color:#1f2937; font-size: 18px;"></h3>
      <div class="time-inputs-container">
        <div class="spin-control-group">
          <button class="spin-btn" onclick="changeHour(-1)">-</button>
          <input type="number" id="input-hours" class="spin-value-input" value="0" min="0" max="23" readonly>
          <button class="spin-btn" onclick="changeHour(1)">+</button>
        </div>
        <div class="time-separator">:</div>
        <div class="spin-control-group">
          <button class="spin-btn" onclick="changeMinute(-1)">-</button>
          <input type="number" id="input-minutes" class="spin-value-input" value="45" min="0" max="59" readonly>
          <button class="spin-btn" onclick="changeMinute(1)">+</button>
        </div>
      </div>
      <div class="modal-actions">
        <button id="btn-modal-cancel" class="btn" style="background-color: #f3f4f6; color: #4b5563; padding: 10px 25px; font-size: 15px;" onclick="closeCustomModal()"></button>
        <button id="btn-modal-save" class="btn" style="background-color: #3b82f6; color: white; padding: 10px 25px; font-size: 15px; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.4);" onclick="confirmCustomTime()"></button>
      </div>
    </div>
  </div>

  <div id="custom-context-menu">
    <div class="context-menu-item" id="btn-delete-time"></div>
  </div>

  <div id="history-context-menu" style="display: none; position: fixed; z-index: 1000; background: white; border-radius: 8px; padding: 4px 0; box-shadow: 0 4px 15px rgba(0,0,0,0.15); border: 1px solid #e5e7eb; width: 80px;">
    <div class="context-menu-item" id="btn-delete-history"></div>
  </div>

  <div id="mini-view">
    <div id="mini-time-display">25:00</div>
    <button id="btn-exit-mini" class="btn btn-exit-mini" onclick="exitMiniMode()"></button>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
